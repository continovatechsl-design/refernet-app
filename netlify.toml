# Copy this file to .env.local and fill in values from:
# Firebase Console -> Project settings -> General -> Your apps -> Web app

VITE_FIREBASE_API_KEY=
VITE_FIREBASE_AUTH_DOMAIN=
VITE_FIREBASE_PROJECT_ID=
VITE_FIREBASE_STORAGE_BUCKET=
VITE_FIREBASE_MESSAGING_SENDER_ID=
VITE_FIREBASE_APP_ID=

# Firebase Console -> Project settings -> Cloud Messaging -> Web configuration
# -> Web Push certificates -> generate/copy the key pair
VITE_FIREBASE_VAPID_KEY=

# Comma-separated list of Google account emails allowed into /admin
VITE_ADMIN_EMAILS=continovatech.sl@gmail.com
